<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Smart Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:#111;
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-size:16px;
}


.hero{
height:500px;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:white;
text-shadow:2px 2px 10px black;
}


section{
padding:60px 80px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
flex-wrap:wrap;
}


.box{
width:280px;
border:1px solid #ccc;
padding:15px;
text-align:center;
background:white;
}

.box img{
width:100%;
height:170px;
object-fit:cover;
margin-bottom:10px;
}

.box h3{
margin:10px 0;
}

.box p{
font-size:14px;
color:#555;
}


form{
display:flex;
flex-direction:column;
width:300px;
margin:auto;
}

input, textarea{
margin:10px 0;
padding:10px;
}

button{
padding:10px;
background:black;
color:white;
border:none;
}


footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>


<nav>

<img src="logo.png" width="80" alt="logo">

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact us.html">Contact</a></li>
</ul>

</nav>
	<section id="contact">

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email">

<textarea placeholder="Message"></textarea>

<button>Send</button>

</form>

</section>


<footer>
TM SMART HOME © 2026
</footer>

</body>
</html>
